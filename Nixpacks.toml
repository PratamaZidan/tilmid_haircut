# ============================================
# NIXPACKS CONFIG
# Laravel + Vite + MySQL on Coolify
# Menggunakan php-fpm + nginx (bukan artisan serve)
# ============================================

[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mbstring",
    "php82Extensions.xml",
    "php82Extensions.curl",
    "php82Extensions.zip",
    "php82Extensions.gd",
    "php82Extensions.bcmath",
    "php82Extensions.tokenizer",
    "php82Extensions.ctype",
    "php82Extensions.fileinfo",
    "php82Extensions.openssl",
    "nodejs_20",
    "nodePackages.npm",
    "nginx"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force --isolated && php artisan storage:link --force && php-fpm82 -D && nginx -g 'daemon off;'"